<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
    <link href="styles.css" rel="stylesheet">
</head>
<body>  
    <div class="container">
        <h1>Job Application Form</h1>
        <form>
            <label for="name">Full Name: 
                <input type="text" name="name" id="name" placeholder="John Doe" required />
            </label>

            <label for="email">Email: 
                <input type="email" name="email" id="email" placeholder="example@mail.com" required />
            </label>

            <label for="position">Choose your position: 
                <select id="position" name="position" required>
                    <option value="">Select option</option>
                    <option value="frontend">Frontend Developer</option>
                    <option value="backend">Backend Developer</option>
                    <option value="fullstack">Fullstack Developer</option>
                    <option value="teamlead">Team Lead</option>
                </select>
            </label>

            <fieldset class="radio-group">
                <legend>Availability: </legend>

                <div class="radio-item">
                    <input type="radio" name="availability" id="full-time" value="full-time" required checked/>
                    <label for="full-time">Full-Time</label>
                </div>

                <div class="radio-item">
                    <input type="radio" name="availability" id="part-time" value="part-time" required/>
                    <label for="part-time">Part-Time</label>
                </div>
            </fieldset>

            <label for="message">Why do you want this job?</label>
            <textarea id="message" name="message" required></textarea>

            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
